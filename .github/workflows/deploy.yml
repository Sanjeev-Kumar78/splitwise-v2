name: SplitwiseV2 CI/CD (ECR → EC2 via SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REPO: ${{vars.ECR_REPO}}
  IMAGE_TAG: ${{vars.IMAGE_TAG}}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. Checkout source
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # --------------------------------------------------
      # 2. Configure AWS credentials (OIDC)
      # --------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      # --------------------------------------------------
      # 3. Login to Amazon ECR
      # --------------------------------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # --------------------------------------------------
      # 4. Build & Push Docker Image
      # --------------------------------------------------
      - name: Build and Push Docker image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # --------------------------------------------------
      # 5. Start EC2 if stopped (for wake-on-request setup)
      # --------------------------------------------------
      - name: Start EC2 if stopped
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)
          echo "EC2 state: $STATE"
          if [ "$STATE" = "stopped" ]; then
            echo "Starting EC2 instance..."
            aws ec2 start-instances --instance-ids "${{ secrets.EC2_INSTANCE_ID }}"
            aws ec2 wait instance-running --instance-ids "${{ secrets.EC2_INSTANCE_ID }}"
            # Extra wait for SSM agent to come online
            sleep 30
            echo "EC2 is running"
          fi

      # --------------------------------------------------
      # 6. Deploy to EC2 via SSM
      # SSM runs as root. We:
      #   Phase 1 (root)     - delete root-owned infra/ and fix ownership
      #   Phase 2 (ec2-user) - git clone, copy secrets, run deploy script
      # --------------------------------------------------
      - name: Deploy to EC2 using SSM
        id: deploy
        run: |
          WORKDIR="${{ secrets.EC2_WORKDIR }}"
          SECRET_DIR="${{ secrets.EC2_SECRET_DIR }}"
          REPO="${{ github.repository }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "SplitwiseV2 Deployment" \
            --parameters commands="[
              \"set -e\",
              \"echo '=== Phase 1: root cleanup ==='\",
              \"rm -rf ${WORKDIR}/infra ${WORKDIR}/docker-compose.yml ${WORKDIR}/temp-repo\",
              \"chown -R ec2-user:ec2-user ${WORKDIR}\",
              \"echo '=== Phase 2: write deploy script ==='\",
              \"cat > /tmp/sw_deploy.sh <<'EOF'\",
              \"#!/bin/bash\",
              \"set -e\",
              \"cd ${WORKDIR}\",
              \"git clone --depth=1 https://github.com/${REPO} temp-repo\",
              \"cp -r temp-repo/infra . && cp temp-repo/docker-compose.yml . && rm -rf temp-repo\",
              \"cp ${SECRET_DIR}/.env .\",
              \"cp ${SECRET_DIR}/script_runner.sh . && chmod +x script_runner.sh\",
              \"./script_runner.sh\",
              \"echo DEPLOY_DONE\",
              \"EOF\",
              \"chmod +x /tmp/sw_deploy.sh\",
              \"echo '=== Phase 3: run as ec2-user ==='\",
              \"su - ec2-user -c 'bash /tmp/sw_deploy.sh'\",
              \"rm -f /tmp/sw_deploy.sh\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait - always print logs even on failure
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || DEPLOY_FAILED=1

          echo "========== SSM STDOUT =========="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'StandardOutputContent' \
            --output text

          echo "========== SSM STDERR =========="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'StandardErrorContent' \
            --output text

          [ -z "$DEPLOY_FAILED" ] || exit 1

  update-repo-url:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      contents: write

    steps:
      - name: Update repository homepage URL
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Use the stable API Gateway URL (not the dynamic EC2 DNS)
          APP_URL="${{ secrets.API_GATEWAY_URL }}"

          echo "Updating repository homepage to: $APP_URL"
          gh repo edit ${{ github.repository }} --homepage "$APP_URL"

          echo "🚀 SplitwiseV2 Deployed Successfully!"
          echo "API Gateway (wake-on-request): $APP_URL"
          echo "Grafana:    $APP_URL/grafana"
          echo "Prometheus: $APP_URL/prometheus"
          echo "Swagger:    $APP_URL/swagger-ui/index.html"
