name: SplitwiseV2 CI/CD (ECR → EC2 via SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REPO: ${{vars.ECR_REPO}}
  IMAGE_TAG: ${{vars.IMAGE_TAG}}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    outputs:
      public-dns: ${{ steps.deploy.outputs.public_dns }}

    steps:
      # --------------------------------------------------
      # 1. Checkout source
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # --------------------------------------------------
      # 2. Configure AWS credentials (OIDC)
      # --------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@main
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Additional steps
        run: |
          # Your commands that require AWS credentials
          aws sts get-caller-identity

      # --------------------------------------------------
      # 3. Login to Amazon ECR
      # --------------------------------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # --------------------------------------------------
      # 4. Build & Push Docker Image
      # --------------------------------------------------
      - name: Build and Push Docker image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # --------------------------------------------------
      # 5. Deploy to EC2 via SSM
      # --------------------------------------------------
      - name: Start EC2 if stopped
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)
          echo "EC2 state: $STATE"
          if [ "$STATE" = "stopped" ]; then
            echo "Starting EC2 instance..."
            aws ec2 start-instances --instance-ids "${{ secrets.EC2_INSTANCE_ID }}"
            aws ec2 wait instance-running --instance-ids "${{ secrets.EC2_INSTANCE_ID }}"
            echo "EC2 is running"
          fi

      - name: Deploy to EC2 using SSM
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "SplitwiseV2 Deployment" \
            --parameters 'commands=[
              "set -e",
              "cd ${{ secrets.EC2_WORKDIR }}",
              "rm -rf infra docker-compose.yml temp-repo",
              "git clone --depth=1 https://github.com/${{ github.repository }} temp-repo",
              "cp -r temp-repo/infra . && cp temp-repo/docker-compose.yml . && rm -rf temp-repo",
              "cp ${{ secrets.EC2_SECRET_DIR }}/.env .",
              "cp ${{ secrets.EC2_SECRET_DIR }}/script_runner.sh . && chmod +x script_runner.sh",
              "./script_runner.sh",
              "echo Deployment completed successfully"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for the SSM command to finish (polls every 15s, up to 10 min)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # Print SSM output for logs
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text

  update-repo-url:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      contents: write

    steps:
      - name: Update repository homepage URL
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Use the stable API Gateway URL (not the dynamic EC2 DNS)
          APP_URL="${{ secrets.API_GATEWAY_URL }}"

          echo "Updating repository homepage to: $APP_URL"
          gh repo edit ${{ github.repository }} --homepage "$APP_URL"

          echo "🚀 SplitwiseV2 Deployed Successfully!"
          echo "API Gateway (wake-on-request): $APP_URL"
          echo "Grafana:    $APP_URL/grafana"
          echo "Prometheus: $APP_URL/prometheus"
          echo "Swagger:    $APP_URL/swagger-ui/index.html"
